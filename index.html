<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="moon-stars">
            <div class="moon"></div>
            <div class="star star1"></div>
            <div class="star star2"></div>
            <div class="star star3"></div>
            <div class="star star4"></div>
            <div class="star star5"></div>
        </div>

        <div class="content">
            <h1 class="greeting">Eid Mubarak!</h1>
            <p class="message">May this blessed day bring joy, peace, and prosperity to you and your loved ones.</p>
            <div class="arabic">عيد مبارك</div>
            <div class="wishes">
                <p>Wishing you happiness and blessings on this special day</p>
            </div>
        </div>

        <div class="mosque">
            <div class="dome"></div>
            <div class="minaret minaret-left"></div>
            <div class="minaret minaret-right"></div>
        </div>
    </div>
</body>
</html>
